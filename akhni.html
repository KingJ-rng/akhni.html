<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Meat Akhni | Rustdale Orders</title>
    <style>
        :root {
            --bg-color: #0c0907;
            --card-bg: #1a130e;
            --accent-color: #e04f32;
            --gold-color: #cca43b;
            --text-main: #f9f6f0;
            --text-muted: #a69e97;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 440px;
            width: 90%;
            padding: 30px 15px;
            text-align: center;
        }
        .hero-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(204, 164, 59, 0.15);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 2.2rem;
            color: var(--text-main);
            margin: 0 0 8px 0;
            font-weight: 800;
        }
        .highlight {
            color: var(--accent-color);
        }
        .price-badge {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--gold-color);
            margin: 20px 0;
        }
        .details-box {
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
            padding: 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 28px;
            border-left: 4px solid var(--gold-color);
        }
        .details-box strong {
            color: var(--text-main);
        }
        .cta-btn {
            display: block;
            background-color: var(--accent-color);
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(224, 79, 50, 0.3);
            transition: opacity 0.2s;
            margin-bottom: 12px;
        }
        .cta-btn:hover {
            opacity: 0.95;
        }
        .map-btn {
            display: block;
            background-color: transparent;
            color: var(--gold-color);
            text-decoration: none;
            font-weight: 600;
            padding: 12px;
            border: 1px solid var(--gold-color);
            border-radius: 8px;
            font-size: 0.95rem;
            transition: background 0.2s;
        }
        .map-btn:hover {
            background: rgba(204, 164, 59, 0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero-card">
        <h1>Meat <span class="highlight">Akhni</span></h1>
        <p style="color: var(--text-muted); margin: 0; font-size: 1rem;">Premium Quality & Authentic Spices</p>
        
        <div class="price-badge">R100 <span style="font-size: 1.2rem; font-weight: 400; color: var(--text-muted);">/ Kilo</span></div>
        
        <div class="details-box">
            📍 <strong>Pickup Location:</strong> 160 Belgravia Road, Rustdale<br>
            📅 <strong>Service Day:</strong> Every Sunday<br>
            ⏳ <strong>Ordering Protocol:</strong> Pre-orders required to guarantee availability.
        </div>

        <!-- Automated booking trigger via his actual number -->
        <a href="https://wa.me/27834540543?text=Slm%20Ahki,%20I%20saw%20your%20Akhni%20page.%20I%20would%20like%20to%20order%20____%20Kilos%20for%20this%20coming%20Sunday." class="cta-btn">Order via WhatsApp</a>
        
        <!-- Direct navigation helper for customer convenience -->
        <a href="https://www.google.com/maps/search/?api=1&query=160+Belgravia+Road+Rustdale+Cape+Town" target="_blank" class="map-btn">📍 Open Map Location</a>
    </div>
</div>

</body>
</html>
