<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Meat Akhni</title>
    <style>
        body {
            background-color: #0c0907;
            color: #f9f6f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .wrapper {
            width: 90%;
            max-width: 400px;
            /* Sets the flyer as the background image of the card */
            background: linear-gradient(rgba(26, 19, 14, 0.75), rgba(26, 19, 14, 0.85)), url('flyer.jpg');
            background-size: cover;
            background-position: center;
            border: 1px solid #cca43b;
            border-radius: 16px;
            padding: 28px;
            text-align: center;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
        }
        h1 {
            color: #e04f32;
            font-size: 2.2rem;
            margin: 0 0 5px 0;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        .price {
            font-size: 2.5rem;
            color: #cca43b;
            font-weight: 800;
            margin: 15px 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }
        .box {
            text-align: left;
            background-color: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 16px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 24px;
            border-left: 4px solid #cca43b;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        }
        .btn {
            display: block;
            background-color: #e04f32;
            color: #ffffff;
            text-decoration: none;
            font-weight: 700;
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(224, 79, 50, 0.4);
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.95;
        }
        .btn-map {
            display: block;
            background-color: rgba(0, 0, 0, 0.4);
            color: #cca43b;
            text-decoration: none;
            font-weight: 600;
            padding: 12px;
            border: 1px solid #cca43b;
            border-radius: 8px;
            font-size: 0.95rem;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            transition: background 0.2s;
        }
        .btn-map:hover {
            background: rgba(204, 164, 59, 0.1);
        }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Meat Akhni</h1>
    <p style="color: #a69e97; margin: 0; font-size: 1rem; text-shadow: 1px 1px 2px rgba(0,0,0,0.8);">Premium Quality & Authentic Spices</p>
    
    <div class="price">R100 / Kilo</div>
    
    <div class="box">
        📍 <strong>Location:</strong> 160 Belgravia Road, Rustdale<br>
        📅 <strong>Day:</strong> Every Sunday<br>
        ⏳ <strong>Note:</strong> Pre-orders required.
    </div>

    <a href="https://wa.me/27834540543?text=Slm%20Ahki,%20I%20saw%20your%20Akhni%20page.%20I%20would%20like%20to%20order%20____%20Kilos%20for%20this%20coming%20Sunday." class="btn">Order via WhatsApp</a>
    
    <a href="https://www.google.com/maps/search/?api=1&query=160+Belgravia+Road+Rustdale+Cape+Town" target="_blank" class="btn-map">📍 Open Map Location</a>
</div>

</body>
</html>
